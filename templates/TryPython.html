<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python</title>
    <!-- 引入共用的 CSS 文件 -->
    <link rel="stylesheet" href="{{ url_for('static', filename='header.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='try.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <!-- Header 部分 -->
    <header>
        <div class="logo">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo">
        </div>
        <nav>
            <ul>
                <li class="area dropdown">
                    <a href="#">Python <span class="arrow"></span></a>
                    <ul class="dropdown-content">
                        <li><a href="#">Python</a></li>
                        <li><a href="#">HTML</a></li>
                        <li><a href="#">JAVA</a></li>
                    </ul>
                </li>
                <li class="area"><a href="#">教學區</a></li>
                <li class="area"><a href="#">問答區</a></li>
                <li class="area"><a href="#">測驗區</a></li>
                <li class="area"><a href="#">好友區</a></li>
                <li class="area profile">
                    <a href="#"><img src="{{ url_for('static', filename='profile1.png') }}" alt="Profile"></a>
                    <ul class="profile-dropdown">
                        <li><a href="#">個人資料</a></li>
                        <li><a href="#">登出</a></li>
                    </ul>
                </li>
            </ul>
        </nav>
    </header>

    <!-- 編輯器區塊 -->
    <div class="line">
        <div class="editor">
            <div class="header-row">
                <h2>Python Code</h2>
                <button onclick="runPythonCode()" class="start"><i class="fas fa-play"></i></button>
            </div>
            <textarea id="pythonCode"></textarea>
        </div>
        <div class="preview">
            <div class="header-row">
                <h2>Output</h2>
            </div>
            <pre id="output" class="result"></pre>
        </div>
    </div>

    <script src="{{ url_for('static', filename='pythonscript.js') }}"></script>
</body>
</html>
