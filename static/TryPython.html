<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Online Compiler</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .editor, .output { width: 48%; float: left; margin: 1%; }
        textarea { width: 100%; height: 300px; }
    </style>
</head>
<body>
    <div class="editor">
        <h3>Python Code</h3>
        <textarea id="pythonCode"></textarea>
        <button onclick="runPythonCode()">Run</button>
    </div>
    <div class="output">
        <h3>Output</h3>
        <pre id="output"></pre>
    </div>

    <script>
        async function runPythonCode() {
            const code = document.getElementById("pythonCode").value;
            console.log("Sending code:", code);  // 檢查發送的代碼
            
            try {
                const response = await fetch('http://127.0.0.1:5500/run-python', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code: code })
                });

                if (!response.ok) {
                    throw new Error(`Server error: ${response.status}`);
                }

                const result = await response.json();
                console.log("Received result:", result);  // 檢查接收的結果
                document.getElementById("output").innerText = result.output || "No output received.";
            } catch (error) {
                console.error("Error:", error);
                document.getElementById("output").innerText = "Error: Unable to fetch or parse response.";
            }
        }
    </script>
</body>
</html>
