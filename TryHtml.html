<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在線編輯器</title>
    <link rel="stylesheet" href="TryHtml.css">
    <link rel="stylesheet" href="header.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header>
        <div class="logo">
            <img src="logo.png" alt="">
        </div>
        <nav>
            <ul>
                <li class="area dropdown">
                    <a href="#">Python <span class="arrow"></span></a>
                    <ul class="dropdown-content">
                        <li><a href="#">Python</a></li>
                        <li><a href="#">HTML</a></li>
                        <li><a href="#">JAVA</a></li>
                    </ul>
                </li>
                <li class="area"><a href="#">教學區</a></li>
                <li class="area"><a href="#">問答區</a></li>
                <li class="area"><a href="#">測驗區</a></li>
                <li class="area"><a href="#">好友區</a></li>
                <li class="area profile">
                    <a href="#"><img src="profile1.png" alt=""></a>
                    <ul class="profile-dropdown">
                        <li><a href="#">個人資料</a></li>
                        <li><a href="#">登出</a></li>
                    </ul>
                </li>
            </ul>
        </nav>
    </header>

    <div class="line">
        <div class="editor">
            <div style="display: flex; justify-content: space-between;">
                <h2>輸入程式碼</h3>
                <button onclick="runCodeHtml()" class="start"><i class="fa-solid fa-play"></i></button>
            </div>
            <textarea id="htmlCode"></textarea>
        </div>
        <div class="preview">
            <h2>執行結果</h3>
            <iframe id="preview" class="result"></iframe>
        </div>
    </div>

    <script src="htmlscript.js"></script>
</body>
</html>
